<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#2e2e3e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Fog overlay -->
    <radialGradient id="fog1" cx="30%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#888899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fog2" cx="75%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#99aabb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" fill="url(#sky)"/>

  <!-- Distant mountains / hills (dark silhouette) -->
  <path d="M0,160 Q80,90 160,130 Q220,80 300,115 Q380,70 460,110 Q540,75 620,105 Q700,65 780,100 Q820,85 860,95 L860,220 L0,220 Z" fill="#111118" opacity="0.9"/>

  <!-- Mid mountains -->
  <path d="M0,180 Q60,145 130,165 Q200,140 270,160 Q340,135 420,158 Q500,138 580,162 Q650,140 730,165 Q790,148 860,158 L860,220 L0,220 Z" fill="#0d0d14" opacity="0.95"/>

  <!-- Foreground treeline left -->
  <path d="M0,195 Q15,160 25,195 Q35,155 48,195 Q60,152 72,195 Q85,148 98,195 Q112,145 128,195 Q140,150 152,195 Q165,143 178,195 Q192,148 205,195 L205,220 L0,220 Z" fill="#080810"/>
  <!-- Foreground treeline right -->
  <path d="M655,195 Q668,150 682,195 Q695,145 708,195 Q722,148 736,195 Q750,143 765,195 Q778,148 792,195 Q805,152 818,195 Q832,148 845,195 Q852,155 860,195 L860,220 L655,220 Z" fill="#080810"/>

  <!-- Fog layers -->
  <rect width="860" height="220" fill="url(#fog1)"/>
  <rect width="860" height="220" fill="url(#fog2)"/>

  <!-- Vignette -->
  <rect width="860" height="220" fill="url(#vignette)"/>

  <!-- Subtle mist streaks -->
  <rect x="0" y="125" width="860" height="18" fill="#aabbcc" opacity="0.04" filter="url(#blur1)"/>
  <rect x="0" y="145" width="860" height="12" fill="#aabbcc" opacity="0.05" filter="url(#blur1)"/>

  <!-- Main text -->
  <text x="430" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="normal" fill="#e8e8e8" text-anchor="middle" letter-spacing="8" opacity="0.95">WELCOME TO SAMUEL MENESES</text>
  <text x="430" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="normal" fill="#e8e8e8" text-anchor="middle" letter-spacing="8" opacity="0.95">GITHUB</text>

  <!-- Thin decorative line below text -->
  <line x1="310" y1="155" x2="550" y2="155" stroke="#e8e8e8" stroke-width="0.5" opacity="0.4"/>
</svg>
