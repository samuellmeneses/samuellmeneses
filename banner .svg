<svg viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="40%" stop-color="#888888"/>
      <stop offset="75%" stop-color="#444444"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#606060"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="fogCenter" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#aaaaaa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fogLeft" cx="15%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#dddddd" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fogRight" cx="85%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="vignetteV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="80%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1400" height="320" fill="url(#sky)"/>

  <!-- Far hills blurred -->
  <path d="M0,220 Q120,155 260,195 Q380,145 520,182 Q660,138 800,175 Q940,132 1080,168 Q1200,130 1330,162 Q1370,150 1400,155 L1400,320 L0,320 Z"
        fill="url(#hillFar)" opacity="0.7" filter="url(#blur6)"/>

  <!-- Mid hill - the big mountain in center -->
  <path d="M-50,320 Q200,140 450,240 Q560,190 700,140 Q840,190 950,240 Q1200,140 1450,320 Z"
        fill="url(#hillMid)" opacity="0.9" filter="url(#blur3)"/>

  <!-- Fog layers -->
  <rect width="1400" height="320" fill="url(#fogCenter)"/>
  <rect width="1400" height="320" fill="url(#fogLeft)"/>
  <rect width="1400" height="320" fill="url(#fogRight)"/>

  <!-- Mist bands -->
  <rect x="0" y="185" width="1400" height="30" fill="#cccccc" opacity="0.08" filter="url(#blur6)"/>
  <rect x="0" y="210" width="1400" height="20" fill="#cccccc" opacity="0.06" filter="url(#blur6)"/>

  <!-- Trees left group -->
  <g fill="#0a0a0a">
    <!-- Tree 1 -->
    <polygon points="30,320 52,220 74,320"/>
    <polygon points="18,320 52,195 86,320"/>
    <!-- Tree 2 -->
    <polygon points="85,320 104,235 123,320"/>
    <polygon points="75,320 104,215 133,320"/>
    <!-- Tree 3 -->
    <polygon points="130,320 150,240 170,320"/>
    <polygon points="120,320 150,220 180,320"/>
    <!-- Tree 4 -->
    <polygon points="175,320 192,250 209,320"/>
    <polygon points="167,320 192,230 217,320"/>
    <!-- Tree 5 -->
    <polygon points="215,320 235,242 255,320"/>
    <polygon points="205,320 235,222 265,320"/>
    <!-- Tree 6 -->
    <polygon points="260,320 278,252 296,320"/>
    <polygon points="252,320 278,235 304,320"/>
    <!-- Tree 7 -->
    <polygon points="298,320 315,258 332,320"/>
    <polygon points="290,320 315,240 340,320"/>
  </g>

  <!-- Trees right group -->
  <g fill="#0a0a0a">
    <polygon points="1060,320 1080,258 1100,320"/>
    <polygon points="1050,320 1080,240 1110,320"/>
    <polygon points="1105,320 1122,252 1139,320"/>
    <polygon points="1097,320 1122,235 1147,320"/>
    <polygon points="1145,320 1165,242 1185,320"/>
    <polygon points="1135,320 1165,222 1195,320"/>
    <polygon points="1192,320 1210,250 1228,320"/>
    <polygon points="1183,320 1210,230 1237,320"/>
    <polygon points="1238,320 1255,240 1272,320"/>
    <polygon points="1230,320 1255,220 1280,320"/>
    <polygon points="1282,320 1302,235 1322,320"/>
    <polygon points="1272,320 1302,215 1332,320"/>
    <polygon points="1330,320 1348,220 1366,320"/>
    <polygon points="1318,320 1348,195 1378,320"/>
    <polygon points="1375,320 1393,220 1411,320"/>
    <polygon points="1363,320 1393,195 1420,320"/>
  </g>

  <!-- Ground dark -->
  <rect x="0" y="295" width="1400" height="25" fill="url(#ground)"/>

  <!-- Vignettes -->
  <rect width="1400" height="320" fill="url(#vignette)"/>
  <rect width="1400" height="320" fill="url(#vignetteV)"/>

  <!-- Text -->
  <text x="700" y="135"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52"
        font-weight="normal"
        fill="#f0f0f0"
        text-anchor="middle"
        letter-spacing="10"
        filter="url(#textShadow)"
        opacity="0.95">WELCOME TO SAMUEL MENESES'</text>
  <text x="700" y="198"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52"
        font-weight="normal"
        fill="#f0f0f0"
        text-anchor="middle"
        letter-spacing="10"
        filter="url(#textShadow)"
        opacity="0.95">GITHUB</text>

  <!-- Thin line under text -->
  <line x1="480" y1="215" x2="920" y2="215" stroke="#e0e0e0" stroke-width="0.7" opacity="0.4"/>
</svg>
